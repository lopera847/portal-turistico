<main class="container">

<form id="formulario" class="form-pro">

<div class="campo">
<label>Nombre</label>
<input type="text" id="nombre">
<small class="error" id="error-nombre"></small>
</div>

<div class="campo">
<label>Email</label>
<input type="email" id="email">
<small class="error" id="error-email"></small>
</div>

<div class="campo">
<label>Destino</label>
<select id="destino">
<option value="">Seleccione</option>
<option>Cartagena</option>
<option>Medellín</option>
<option>San Andrés</option>
<option>Santa Marta</option>
<option>Eje Cafetero</option>
<option>Bogotá</option>
</select>
<small class="error" id="error-destino"></small>
</div>

<div class="campo">
<label>Mensaje</label>
<textarea id="mensaje"></textarea>
<small class="error" id="error-mensaje"></small>
</div>

<div class="checkbox">
<input type="checkbox" id="check"> Acepto términos
</div>

<small id="error-check"></small>

<button type="submit">Enviar</button>

<p id="respuesta"></p>

</form>



</main>
