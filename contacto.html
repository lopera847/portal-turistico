<nav>

</nav>

<main>

<form id="formulario" class="form-pro">

<div class="campo">
<label for="nombre">Nombre</label>
<input type="text" id="nombre" placeholder="Tu nombre">
<small class="error" id="error-nombre"></small>
</div>

<div class="campo">
<label for="email">Correo</label>
<input type="email" id="email" placeholder="ejemplo@mail.com">
<small class="error" id="error-email"></small>
</div>

<div class="campo">
<label for="destino">Destino</label>
<select id="destino">
<option value="">Seleccione un destino</option>
<option>Cartagena</option>
<option>Medellín</option>
<option>San Andrés</option>
</select>
<small class="error" id="error-destino"></small>
</div>

<div class="campo">
<label for="mensaje">Mensaje</label>
<textarea id="mensaje" placeholder="Escribe tu mensaje..."></textarea>
<small class="error" id="error-mensaje"></small>
</div>

<div class="checkbox">
<input type="checkbox" id="check">
<label for="check">Acepto términos</label>
</div>

<small class="error" id="error-check"></small>

<button type="submit">Enviar</button>

<p id="respuesta"></p>

</form>

</main>

<footer>
<p>© 2026 Turismo Colombia</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
